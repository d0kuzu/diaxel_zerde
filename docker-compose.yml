networks:
  diaxel_net:
    driver: bridge

services:
  postgres:
    image: postgres:16
    container_name: diaxel_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: diaxel
      POSTGRES_USER: diaxel_user
      POSTGRES_PASSWORD: diaxel_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - diaxel_net

  database-service:
    build: ./database-service
    container_name: database-service
    depends_on:
      - postgres
    ports:
      - "50051:50051"
    env_file:
      - ./database-service/.env
    networks:
      - diaxel_net

  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "8082:8080"
    depends_on:
      - database-service
    env_file:
      - ./auth-service/.env
    networks:
      - diaxel_net

  ai-service:
    build: ./ai-service
    container_name: ai-service
    ports:
      - "8081:8080"
    depends_on:
      - database-service
    env_file:
      - ./ai-service/.env
    networks:
      - diaxel_net

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - database-service
      - auth-service
      - ai-service
    env_file:
      - ./api-gateway/.env
    networks:
      - diaxel_net

volumes:
  postgres_data:
