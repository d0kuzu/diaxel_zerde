version: "3.9"

services:
  database-service:
    build: .
    container_name: database-service
    networks:
      - microservices-net
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: database-postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: database_service

  postgres:
    image: postgres:16-alpine
    container_name: database-postgres
    networks:
      - microservices-net
    restart: unless-stopped
    environment:
      POSTGRES_DB: database_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - diaxel_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d database_service"]
      interval: 3s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:

networks:
  microservices-net:
    external: true